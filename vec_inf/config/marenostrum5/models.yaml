# Test models
#  - Qwen3.5-27B-v0.18.0
#  - Qwen3-32B

models:
  DeepSeek-V3.2-Speciale:
    model_family: DeepSeek
    model_variant: V3.2-Speciale
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 4
    vocab_size: 129280
    vllm_args:
      --distributed-executor-backend: ray
      --trust-remote-code: true
      --gpu-memory-utilization: 0.8
      --tensor-parallel-size: 16
      --max-model-len: 16384
      --enforce-eager: true
  GLM-4.6:
    model_family: GLM-4.6
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 4
    vocab_size: 151552
    vllm_args:
      --max-model-len: 16384
      --distributed-executor-backend: ray
      --tensor-parallel-size: 16
      --gpu-memory-utilization: 0.7
      --enforce-eager: true
  GLM-4.7:
    model_family: GLM-4.7
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 8
    vocab_size: 151552
    bind: "/home/bsc/$USER"
    vllm_args:
      --distributed-executor-backend: ray
      --trust-remote-code: true
      --tensor-parallel-size: 32
      --config: "@repo/compilation_configs/glm47.yaml"
  GLM-4.7-Flash:
    model_family: GLM-4.7
    model_variant: Flash
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 154880
    bind: "/home/bsc/$USER"
    vllm_args:
      --tensor-parallel-size: 4
      --trust-remote-code: true
      --config: "@repo/compilation_configs/glm47_flash_agent.yaml"
  GLM-4.5-Air-FP8:
    model_family: GLM-4.5
    model_variant: Air-FP8
    model_type: LLM
    # Source-backed 1-node choice for 4xH100 64GB when you need >=32k context
    # without falling back to eager mode.
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 151552
    vllm_args:
      --tensor-parallel-size: 4
      --trust-remote-code: true
      --max-model-len: 32768
      --gpu-memory-utilization: 0.75
      --kv-cache-dtype: fp8_e4m3
      --enable-chunked-prefill: true
      --config: "@repo/compilation_configs/glm45_air_fp8_single.yaml"
  InternVL3_5-8B-Instruct:
    model_family: InternVL3_5
    model_variant: 8B-Instruct
    model_type: VLM
    num_nodes: 1
    gpus_per_node: 1
    vocab_size: 151936
    venv: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/venvs/vllm_latest/.venv"
    vllm_args:
      --trust-remote-code: true
      --tensor-parallel-size: 1
      --pipeline-parallel-size: 1
      --max-model-len: 40960
  Llama-3.2-3B-Instruct:
    model_family: Llama-3.2
    model_variant: 3B-Instruct
    model_type: LLM
    num_nodes: 1
    gpus_per_node: 1
    vocab_size: 128256
    vllm_args:
      --max-model-len: 16384
      --tensor-parallel-size: 1
      --gpu-memory-utilization: 0.7

  Kimi-K2-Thinking:
    model_family: Kimi
    model_variant: K2-Thinking
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 4
    vocab_size: 163840
    vllm_args:
      --distributed-executor-backend: ray
      --trust-remote-code: true
      --max-model-len: 65536
      --gpu-memory-utilization: 0.8
      --tensor-parallel-size: 16
      --max-num-batched-tokens: 1024
      --max-num-seqs: 8
      --enable-auto-tool-choice: true
      --tool-call-parser: kimi_k2
      --reasoning-parser: kimi_k2
      --enforce-eager: true
  Kimi-K2.5:
    model_family: Kimi
    model_variant: K2.5
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 4
    vocab_size: 163840
    qos: acc_debug
    time: "02:00:00"
    partition: acc
    account: bsc70
    venv: "singularity"
    cuda_compat_shim: true
    cuda_compat_shim_source: "/usr/local/cuda-12.9/compat/lib.real/libcuda.so.1"
    bind: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/.cache/vllm,/home/bsc/$USER"
    env:
      SINGULARITYENV_LD_LIBRARY_PATH: "$HOME/cuda_shim:/usr/local/cuda-12.9/compat/lib.real:$LD_LIBRARY_PATH"
    vllm_args:
      --distributed-executor-backend: ray
      --trust-remote-code: true
      --max-model-len: 64000
      --gpu-memory-utilization: 0.8
      --tensor-parallel-size: 16
      --enable-auto-tool-choice: true
      --tool-call-parser: kimi_k2
      --reasoning-parser: kimi_k2
      --config: "@repo/compilation_configs/kimi_single.yaml"
  MiniMax-M2.1:
    model_family: MiniMax
    model_variant: M2.1
    model_type: LLM
    # Experimental latency-oriented profile for a single 4xH100 64GB node.
    # Official MiniMax docs recommend 4x96GB for a comfortable 1-node setup.
    num_nodes: 1
    gpus_per_node: 4
    vocab_size: 200064
    bind: "/home/bsc/$USER"
    vllm_args:
      --trust-remote-code: true
      --tensor-parallel-size: 4
      --max-model-len: 16384
      --gpu-memory-utilization: 0.94
      --enable-chunked-prefill: true
      --enable-prefix-caching: true
      --enable-auto-tool-choice: true
      --tool-call-parser: minimax_m2
      --reasoning-parser: minimax_m2_append_think
      --config: "@repo/compilation_configs/minimax_single.yaml"

  MiniMax-M2.5:
    model_family: MiniMax
    model_variant: M2.5
    model_type: LLM
    # Single-replica profile for mostly sequential agent calls.
    # MiniMax's documented vLLM layout is TP=4 on 4 GPUs or TP=8+EP on 8 GPUs.
    num_nodes: 2
    gpus_per_node: 4
    vocab_size: 200064
    bind: "/home/bsc/$USER"
    env:
      VLLM_ALLREDUCE_USE_SYMM_MEM: "0"
    vllm_args:
      --distributed-executor-backend: ray
      --trust-remote-code: true
      --tensor-parallel-size: 8
      --enable-expert-parallel: true
      --all2all-backend: allgather_reducescatter
      --disable-custom-all-reduce: true
      --max-model-len: 32768
      --gpu-memory-utilization: 0.85
      --kv-cache-dtype: fp8_e4m3
      --enable-chunked-prefill: true
      --enable-prefix-caching: true
      --enable-auto-tool-choice: true
      --tool-call-parser: minimax_m2
      --reasoning-parser: minimax_m2_append_think
      --config: "@repo/compilation_configs/minimax_agent.yaml"

  NVIDIA-Nemotron-3-Super-120B-A12B-FP8_venv:
    model_family: NVIDIA-Nemotron-3
    model_variant: Super-120B-A12B-FP8
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 131072
    venv: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/venvs/vllm_latest/.venv"
    vllm_args:
      --tensor-parallel-size: 4
      --trust-remote-code: true
      --max-model-len: 262144
      --kv-cache-dtype: fp8
      --gpu-memory-utilization: 0.9
      --attention-backend: TRITON_ATTN
      --enable-chunked-prefill: true
      --reasoning-parser: nemotron_v3
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder
      --config: "@repo/compilation_configs/nemotron_single.yaml"

  NVIDIA-Nemotron-3-Super-120B-A12B-FP8:
    model_family: NVIDIA-Nemotron-3
    model_variant: Super-120B-A12B-FP8
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 131072
    venv: "singularity"
    bind: "/home/bsc/$USER"
    vllm_args:
      --tensor-parallel-size: 4
      --trust-remote-code: true
      --max-model-len: 262144
      --kv-cache-dtype: fp8
      --gpu-memory-utilization: 0.9
      --attention-backend: TRITON_ATTN
      --enable-chunked-prefill: true
      --enable-prefix-caching: true
      --reasoning-parser: nemotron_v3
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder
      --config: "@repo/compilation_configs/nemotron_multi_seq.yaml"

  Qwen3.5-397B-A17B:
    model_family: Qwen3.5
    model_variant: 397B-A17B
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 4
    vocab_size: 248320
    venv: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/venvs/vllm_nightly/.venv"
    # FlashInfer (used by Qwen3.5 linear attn/GDN path) requires a CUDA toolkit
    # new enough to provide the <cuda/ptx> header (present in MN5 cuda/12.4+).
    # Ensure nvcc + headers come from the toolkit matching torch (cu128).
    env:
      PATH: "/apps/ACC/CUDA/12.8/bin:$PATH"
      CUDA_HOME: "/apps/ACC/CUDA/12.8"
      CUDACXX: "/apps/ACC/CUDA/12.8/bin/nvcc"
      # Keep the CUDA compat runtime first to avoid "provided PTX was compiled
      # with an unsupported toolchain" when using cu128 wheels on older drivers.
      LD_LIBRARY_PATH: "/usr/local/cuda-12.9/compat/lib.real:/usr/local/cuda-12.9/compat:/apps/ACC/CUDA/12.8/lib64:$LD_LIBRARY_PATH"
      # First-token latency can include heavy JIT/AOT compilation on multi-node
      # Ray runs; the default 300s timeout can be too low.
      RAY_CGRAPH_get_timeout: "1800"
      # FlashInfer JIT can be very slow on shared home filesystems; prefer the
      # job working directory cache (and isolate per node to avoid contention).
      FLASHINFER_CACHE_DIR: "${TMPDIR:-$PWD/.vec-inf-cache}/flashinfer/$SLURMD_NODENAME"
      # Keep compilation caches off $HOME when possible.
      TORCHINDUCTOR_CACHE_DIR: "${TMPDIR:-$PWD/.vec-inf-cache}/torchinductor"
      TRITON_CACHE_DIR: "${TMPDIR:-$PWD/.vec-inf-cache}/triton"
    vllm_args:
      --distributed-executor-backend: ray
      --tensor-parallel-size: 16
      --trust-remote-code: true
      --gpu-memory-utilization: 0.75
      --attention-backend: "FLASH_ATTN"
      --max-model-len: 32768
      --language-model-only: true
      --reasoning-parser: qwen3
      --config: "@repo/compilation_configs/qwen_single.yaml"

  Qwen3.5-27B:
    model_family: Qwen3.5
    model_variant: 27B
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 248320
    venv: "singularity"
    image_path: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/singularity/vllm_latest_sand"
    cuda_compat_shim: false
    vllm_args:
      --tensor-parallel-size: 4
      --max-model-len: 48000
      --attention-backend: FLASH_ATTN
      --gpu-memory-utilization: 0.9
      --enable-prefix-caching: true
      --disable-log-stats: false
      --reasoning-parser: qwen3
      --language-model-only: true
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder

      --config: "@repo/compilation_configs/qwen_single_seq.yaml"

  Qwen3.5-27B-v0.18.0:
    model_family: Qwen3.5
    model_variant: 27B
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 248320
    model_weights_dir_name: Qwen3.5-27B
    venv: "singularity"
    bind: "/home/bsc/$USER"
    # The image preloads the CUDA compat PTX JIT internally.
    cuda_compat_shim: false
    env:
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"
      # /cache is a short in-container bind to ${work_dir}/.vec-inf-cache on
      # scratch. Keep temp on /tmp so vLLM's local IPC sockets stay short.
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --tensor-parallel-size: 4
      # Agent-oriented profile: trade excess context headroom for faster batching
      # and higher usable concurrency on a 4xH100 node.
      --max-model-len: 55000
      --attention-backend: TRITON_ATTN
      --gpu-memory-utilization: 0.9
      --kv-cache-dtype: fp8_e4m3
      --enable-chunked-prefill: true
      --performance-mode: interactivity
      --mamba-cache-mode: align
      --mamba-block-size: 8
      --speculative-config.method: mtp
      --speculative-config.num_speculative_tokens: 1
      --enable-prefix-caching: true
      --reasoning-parser: qwen3
      --language-model-only: true
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder
      --config: "@repo/compilation_configs/qwen_multi_seq.yaml"

  Qwen3-30B-A3B-Thinking-2507:
    model_family: Qwen3
    model_variant: 30B-A3B-Thinking-2507
    model_type: LLM
    num_nodes: 1
    vocab_size: 151936
    vllm_args:
      --tensor-parallel-size: 4
      --max-model-len: 131072
      --reasoning-parser: deepseek_r1
      --enforce-eager: true
    gpus_per_node: 4
  Qwen3-Coder-480B-A35B-Instruct:
    model_family: Qwen3
    model_variant: 480B-A35B-Instruct
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 8
    vocab_size: 151936
    vllm_args:
      --tensor-parallel-size: 4
      --pipeline-parallel-size: 8
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder

  Qwen3-Coder-Next:
    model_family: Qwen3
    model_variant: Coder-Next
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 151936
    venv: "singularity"
    vllm_args:
      --attention-backend: flashinfer
      --tensor-parallel-size: 4
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder
      --max-model-len: 29000
      --gpu-memory-utilization: 0.8
      --config: "@repo/compilation_configs/qwen_single.yaml"

  Qwen3-Next-80B-A3B-Instruct:
    model_family: Qwen3
    model_variant: Next-80B-A3B-Instruct
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 151936
    vllm_args:
      --tensor-parallel-size: 4
      --max-model-len: 131072
      --enforce-eager: true
  
  gpt-oss-120b-0109:
    model_family: gpt-oss
    model_variant: 120b
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 201088
    venv: "singularity"
    model_weights_dir_name: gpt-oss-120b-0109
    bind: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/,/home/bsc/$USER"
    env:
      TIKTOKEN_RS_CACHE_DIR: "/home/bsc/$USER/openai_tokenizer"
      VLLM_CACHE_ROOT: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/.cache/vllm"
      # Keep torch compile artifacts on scratch-backed /cache instead of $HOME.
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --tensor-parallel-size: 4
      --gpu-memory-utilization: 0.8
      --max-model-len: 65536
      --kv-cache-dtype: fp8_e4m3
      --enable-prefix-caching: true
      --config: "@repo/compilation_configs/gptoss.yaml"

  Qwen3-32B:
    model_family: Qwen3
    model_variant: 32B
    model_type: LLM
    num_nodes: 1
    vocab_size: 248320
    gpus_per_node: 4
    venv: "singularity"
    vllm_args:
      --tensor-parallel-size: 4
      --max-model-len: 32768
      --reasoning-parser: deepseek_r1
      --config: "@repo/compilation_configs/qwen_single.yaml"
    
