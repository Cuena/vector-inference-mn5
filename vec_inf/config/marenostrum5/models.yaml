# Tested models (on the shared vllm_openai_0.18.0.sif):
#   Kimi-K2.5, NVIDIA-Nemotron-3-Super-120B-A12B-FP8,
#   Qwen3.5-27B-v0.18.0, gpt-oss-120b-0109
#
# Llama-3.2-3B-Instruct is kept as the lightweight smoke-test default.
#
# MN5 Singularity bind behavior:
#   - `bind: "/home/bsc/$USER"` exposes that host path at the same path inside
#     the container.
#   - `XDG_CACHE_HOME=/cache` maps to `${work_dir}/.vec-inf-cache` on the host.
#   - `TORCHINDUCTOR_CACHE_DIR=/cache/torchinductor` maps to
#     `${work_dir}/.vec-inf-cache/torchinductor` on the host.
#   - `TRITON_CACHE_DIR=/cache/triton` maps to
#     `${work_dir}/.vec-inf-cache/triton` on the host.
#   - `TMPDIR=/tmp`, `TMP=/tmp`, and `TEMP=/tmp` use the host `/tmp`.
#
# Untested / user-specific profiles are commented out at the bottom of
# this file. Uncomment and review before using them.

models:
  Llama-3.2-3B-Instruct:
    model_family: Llama-3.2
    model_variant: 3B-Instruct
    model_type: LLM
    num_nodes: 1
    gpus_per_node: 1
    vocab_size: 128256
    vllm_args:
      --max-model-len: 16384
      --tensor-parallel-size: 1
      --gpu-memory-utilization: 0.7

  Kimi-K2.5:
    model_family: Kimi
    model_variant: K2.5
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 4
    vocab_size: 163840
    qos: acc_debug
    time: "02:00:00"
    partition: acc
    account: bsc70
    venv: "singularity"
    image_path: "/gpfs/scratch/bsc70/singularity/vllm_openai_0.19.1.sif"
    # The default 0.18.0 SIF bakes in CUDA forward-compat via its %environment
    # (LD_LIBRARY_PATH, LD_PRELOAD, VLLM_ENABLE_CUDA_COMPATIBILITY). No
    # host-side cuda_compat_shim is needed.
    cuda_compat_shim: false
    bind: "/home/bsc/$USER"
    env:
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --distributed-executor-backend: ray
      --trust-remote-code: true
      --max-model-len: 64000
      --gpu-memory-utilization: 0.8
      --tensor-parallel-size: 16
      --enable-auto-tool-choice: true
      --tool-call-parser: kimi_k2
      --reasoning-parser: kimi_k2
      --config: "@repo/compilation_configs/kimi_single.yaml"

  Kimi-K2.6:
    model_family: Kimi
    model_variant: K2.6
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 4
    vocab_size: 163840
    qos: acc_debug
    time: "02:00:00"
    partition: acc
    account: bsc70
    venv: "singularity"
    image_path: "/gpfs/scratch/bsc70/singularity/vllm_openai_0.20.1-cu129-deepgemm.sif"
    cuda_compat_shim: false
    bind: "/home/bsc/$USER"
    env:
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --distributed-executor-backend: ray
      --trust-remote-code: true
      --max-model-len: 100000
      --gpu-memory-utilization: 0.8
      --tensor-parallel-size: 16
      --enable-auto-tool-choice: true
      --tool-call-parser: kimi_k2
      --reasoning-parser: kimi_k2
      --config: "@repo/compilation_configs/kimi_single.yaml"

  NVIDIA-Nemotron-3-Super-120B-A12B-FP8:
    model_family: NVIDIA-Nemotron-3
    model_variant: Super-120B-A12B-FP8
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 131072
    venv: "singularity"
    bind: "/home/bsc/$USER"
    env:
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --tensor-parallel-size: 4
      --trust-remote-code: true
      --max-model-len: 262144
      --kv-cache-dtype: fp8
      --gpu-memory-utilization: 0.9
      --attention-backend: TRITON_ATTN
      --enable-chunked-prefill: true
      --enable-prefix-caching: true
      --reasoning-parser: nemotron_v3
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder
      --config: "@repo/compilation_configs/nemotron_multi_seq.yaml"

  Qwen3.5-27B-v0.18.0:
    model_family: Qwen3.5
    model_variant: 27B
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 248320
    model_weights_dir_name: Qwen3.5-27B
    venv: "singularity"
    bind: "/home/bsc/$USER"
    # The image preloads the CUDA compat PTX JIT internally.
    cuda_compat_shim: false
    env:
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"
      # /cache is a short in-container bind to ${work_dir}/.vec-inf-cache on
      # scratch. Keep temp on /tmp so vLLM's local IPC sockets stay short.
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --tensor-parallel-size: 4
      # Agent-oriented profile: trade excess context headroom for faster batching
      # and higher usable concurrency on a 4xH100 node.
      --max-model-len: 55000
      --attention-backend: TRITON_ATTN
      --gpu-memory-utilization: 0.9
      --kv-cache-dtype: fp8_e4m3
      --enable-chunked-prefill: true
      --performance-mode: interactivity
      --mamba-cache-mode: align
      --mamba-block-size: 8
      --speculative-config.method: mtp
      --speculative-config.num_speculative_tokens: 1
      --enable-prefix-caching: true
      --reasoning-parser: qwen3
      --language-model-only: true
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder
      --config: "@repo/compilation_configs/qwen_multi_seq.yaml"

  gpt-oss-120b-0109:
    model_family: gpt-oss
    model_variant: 120b
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 201088
    venv: "singularity"
    model_weights_dir_name: gpt-oss-120b-0109
    bind: "/home/bsc/$USER"
    env:
      TIKTOKEN_RS_CACHE_DIR: "/gpfs/scratch/bsc70/hpai/storage/projects/heka/models/gpt-oss-120b-0109/.tiktoken_cache"
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --tensor-parallel-size: 4
      --gpu-memory-utilization: 0.8
      --max-model-len: 65536
      --kv-cache-dtype: fp8_e4m3
      --enable-prefix-caching: true
      --config: "@repo/compilation_configs/gptoss.yaml"

  gemma-4-31B-it:
    model_family: gemma-4
    model_variant: 31B-it
    model_type: VLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 262144
    venv: "singularity"
    image_path: "/gpfs/scratch/bsc70/singularity/vllm_openai_0.20.1-cu129.sif"
    bind: "/home/bsc/$USER"
    cuda_compat_shim: false
    env:
      XDG_CACHE_HOME: "/cache"
      TMPDIR: "/tmp"
      TMP: "/tmp"
      TEMP: "/tmp"
      TORCHINDUCTOR_CACHE_DIR: "/cache/torchinductor"
      TRITON_CACHE_DIR: "/cache/triton"
    vllm_args:
      --tensor-parallel-size: 4
      --max-model-len: 65536
      --gpu-memory-utilization: 0.95
      --kv-cache-dtype: fp8_e4m3
      --enable-auto-tool-choice: true
      --reasoning-parser: gemma4
      --tool-call-parser: gemma4
      # Text-first agentic profile. Remove image=0 to enable vision later.
      --limit-mm-per-prompt: '{"image":0,"audio":0}'
      --config: "@repo/compilation_configs/gemma4_single_agent.yaml"

  Qwen3-Coder-Next:
    model_family: Qwen3
    model_variant: Coder-Next
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 151936
    venv: "singularity"
    bind: "/home/bsc/$USER"
    vllm_args:
      --attention-backend: flashinfer
      --tensor-parallel-size: 4
      --enable-auto-tool-choice: true
      --tool-call-parser: qwen3_coder
      --max-model-len: 29000
      --gpu-memory-utilization: 0.8
      --config: "@repo/compilation_configs/qwen_single.yaml"


