    model_variant: Coder-Next
    model_type: LLM
    gpus_per_node: 4
    num_nodes: 1
    vocab_size: 151936
    venv: "singularity"
    image_path: "/gpfs/scratch/bsc70/hpai/storage/users/$VEC_INF_STORAGE_USER/singularity/vllm_$VEC_INF_STORAGE_USER.sif"
